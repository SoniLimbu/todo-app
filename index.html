<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do App</title>

    <!-- CSS File -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Main container -->
    <div class="container">

        <h1> To-Do App</h1>

        <!-- Input and button -->
        <div class="input-box">
            <input
                type="text"
                id="taskInput"
                placeholder="Enter your task"
            >

            <button onclick="addTask()">
                Add
            </button>
        </div>

        <!-- Task list -->
        <ul id="taskList"></ul>

    </div>

    <!-- JavaScript File -->
    <script src="script.js"></script>

</body>
</html>
